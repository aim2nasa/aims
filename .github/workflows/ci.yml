name: CI

on:
  workflow_dispatch:  # 수동 실행
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'tests/**'
      - '.github/workflows/**'

jobs:
  frontend:
    name: Frontend
    uses: ./.github/workflows/ci-frontend.yml

  backend:
    name: Backend
    uses: ./.github/workflows/ci-backend.yml

  python:
    name: Python
    uses: ./.github/workflows/ci-python.yml

  architecture:
    name: Architecture
    uses: ./.github/workflows/ci-architecture.yml
