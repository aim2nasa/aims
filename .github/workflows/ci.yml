name: CI

on:
  workflow_dispatch:  # 수동 실행
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'

jobs:
  frontend:
    name: Frontend
    uses: ./.github/workflows/ci-frontend.yml

  backend:
    name: Backend
    uses: ./.github/workflows/ci-backend.yml

  python:
    name: Python
    uses: ./.github/workflows/ci-python.yml

  e2e:
    name: E2E & Accessibility
    uses: ./.github/workflows/ci-e2e.yml
    needs: frontend  # Frontend 테스트 통과 후 실행

  architecture:
    name: Architecture
    uses: ./.github/workflows/ci-architecture.yml
