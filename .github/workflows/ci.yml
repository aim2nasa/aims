name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/aims-uix3/package-lock.json
            backend/api/aims_api/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 프론트엔드 테스트
      - name: Install frontend dependencies
        run: |
          cd frontend/aims-uix3
          rm -rf node_modules package-lock.json
          npm install

      - name: Type check frontend
        run: |
          cd frontend/aims-uix3
          npm run typecheck

      - name: Run frontend tests
        run: |
          cd frontend/aims-uix3
          npm test -- --run

      # 백엔드 테스트
      - name: Install backend dependencies
        run: |
          cd backend/api/aims_api
          npm ci

      - name: Run backend tests
        run: |
          cd backend/api/aims_api
          npm run test:ci

      # Python API 테스트
      - name: Install Python dependencies (all APIs)
        run: |
          pip install --no-cache-dir -r backend/api/doc_status_api/requirements.txt
          pip install --no-cache-dir -r backend/api/annual_report_api/requirements.txt
          pip install --no-cache-dir -r backend/api/aims_rag_api/requirements.txt

      - name: Run Python API tests
        env:
          OPENAI_API_KEY: sk-test-mock-key-for-ci-testing-only
        run: |
          cd backend/api/doc_status_api && python -m pytest -v
          cd ../annual_report_api && python -m pytest -v
          cd ../aims_rag_api && python -m pytest -v
