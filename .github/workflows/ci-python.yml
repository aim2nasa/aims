name: CI Python

on:
  workflow_dispatch:  # 수동 실행
  workflow_call:      # 다른 워크플로우에서 호출

jobs:
  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies (all APIs)
        run: |
          pip install --no-cache-dir -r backend/api/doc_status_api/requirements.txt
          pip install --no-cache-dir -r backend/api/annual_report_api/requirements.txt
          pip install --no-cache-dir -r backend/api/aims_rag_api/requirements.txt

      - name: Run doc_status_api tests
        env:
          OPENAI_API_KEY: sk-test-mock-key-for-ci-testing-only
        run: |
          cd backend/api/doc_status_api && python -m pytest -v

      - name: Run annual_report_api tests
        env:
          OPENAI_API_KEY: sk-test-mock-key-for-ci-testing-only
        run: |
          cd backend/api/annual_report_api && python -m pytest -v

      - name: Run aims_rag_api tests
        env:
          OPENAI_API_KEY: sk-test-mock-key-for-ci-testing-only
        run: |
          cd backend/api/aims_rag_api && python -m pytest -v
