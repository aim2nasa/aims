name: CI Python

on:
  workflow_dispatch:  # 수동 실행
  workflow_call:      # 다른 워크플로우에서 호출

jobs:
  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies (all APIs)
        run: |
          pip install --no-cache-dir -r backend/api/annual_report_api/requirements.txt
          pip install --no-cache-dir -r backend/api/aims_rag_api/requirements.txt
          pip install --no-cache-dir -r backend/api/pdf_proxy/requirements.txt
          pip install --no-cache-dir -r backend/api/document_pipeline/requirements.txt
          pip install ruff pytest "pytest-asyncio>=0.23,<0.25" httpx

      - name: Lint Python (ruff)
        run: |
          ruff check backend/api/document_pipeline/ --config pyproject.toml --exclude "__pycache__,tests,scripts,golden_master,xpipe"
          ruff check backend/api/annual_report_api/ --config pyproject.toml --exclude "__pycache__,tests,scripts"
          ruff check backend/api/aims_rag_api/ --config pyproject.toml --exclude "__pycache__,tests"
          ruff check backend/api/pdf_proxy/ --config pyproject.toml --exclude "__pycache__,tests"

      - name: Run annual_report_api tests
        env:
          OPENAI_API_KEY: sk-test-mock-key-for-ci-testing-only
        run: |
          cd backend/api/annual_report_api && python -m pytest -v

      - name: Run aims_rag_api tests
        env:
          OPENAI_API_KEY: sk-test-mock-key-for-ci-testing-only
        run: |
          cd backend/api/aims_rag_api && python -m pytest -v

      - name: Run document_pipeline tests
        env:
          OPENAI_API_KEY: sk-test-mock-key-for-ci-testing-only
        run: |
          sudo mkdir -p /data && sudo chmod 777 /data
          cd backend/api/document_pipeline && python -m pytest tests/ -v --ignore=tests/smoke_test.py --ignore=tests/generate_fixtures.py
