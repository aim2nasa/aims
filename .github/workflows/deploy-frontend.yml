name: Build AIMS Frontend

on:
  workflow_dispatch:  # 수동 실행

# NOTE: 실제 배포는 로컬에서 ./deploy_all.sh 사용
# 서버는 Tailscale VPN으로만 접근 가능하여 GitHub Actions에서 배포 불가

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend/aims-uix3
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm install @rollup/rollup-linux-x64-gnu

      - name: Build
        working-directory: frontend/aims-uix3
        run: npm run build

      - name: Build successful
        run: |
          echo "✅ Frontend build successful!"
          echo "📦 Deploy manually: ssh tars 'cd ~/aims && ./deploy_all.sh'"
