name: Deploy AIMS Frontend

on:
  workflow_dispatch:  # 수동 실행만 가능 (GitHub Actions 페이지에서 "Run workflow" 클릭)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/aims-uix3/package-lock.json

      - name: Install dependencies
        working-directory: frontend/aims-uix3
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build
        working-directory: frontend/aims-uix3
        run: npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          rsync -avz --delete \
            frontend/aims-uix3/dist/ \
            ${{ vars.SERVER_USER }}@${{ vars.SERVER_HOST }}:/home/rossi/aims/frontend/aims-uix3/dist/

      - name: Notify completion
        run: echo "✅ Frontend deployed successfully!"
