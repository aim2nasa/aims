name: CI E2E Tests

on:
  workflow_dispatch:  # 수동 실행
  workflow_call:      # 다른 워크플로우에서 호출
  pull_request:
    branches: [main]
    paths:
      - 'frontend/aims-uix3/**'
      - '.github/workflows/ci-e2e.yml'

jobs:
  e2e-test:
    name: E2E & Accessibility Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd frontend/aims-uix3
          npm ci

      - name: Install Playwright browsers
        run: |
          cd frontend/aims-uix3
          npx playwright install --with-deps chromium

      - name: Build frontend
        run: |
          cd frontend/aims-uix3
          npm run build

      - name: Start preview server
        run: |
          cd frontend/aims-uix3
          npm run preview &
          sleep 5

      - name: Run CI smoke tests (no auth required)
        run: |
          cd frontend/aims-uix3
          npx playwright test tests/ci --project=chromium --no-deps --reporter=list

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            frontend/aims-uix3/playwright-report/
            frontend/aims-uix3/test-results/
          retention-days: 7

      - name: Upload snapshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-snapshots
          path: frontend/aims-uix3/tests/__snapshots__/
          retention-days: 7
