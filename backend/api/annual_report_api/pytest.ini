[pytest]
# pytest 설정 파일

# 테스트 검색 패턴
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 테스트 디렉토리
testpaths = tests

# 출력 옵션 (커버리지는 CI에서만: --cov=. --cov-report=term)
addopts = -v --tb=short

# 마커 정의
markers =
    unit: 유닛 테스트
    integration: 통합 테스트
    slow: 느린 테스트
