[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501", "E402"]  # E402: sys.path 조작이 필요한 파일이 다수

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F811"]
"scripts/*" = ["F841"]
"golden_master/*" = ["F841"]
"**/__init__.py" = ["F401"]  # re-export 패턴 허용

[tool.ruff.lint.isort]
known-first-party = ["internal_api", "internal_api_client", "analytics_writer"]
