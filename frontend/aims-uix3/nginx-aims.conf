# HTTP -> HTTPS 리디렉션
server {
    listen 80;
    server_name aims.giize.com;

    location /.well-known/acme-challenge/ {
        root /var/www/aims;
    }

    return 301 https://$host$request_uri;
}

# HTTPS 설정
server {
    listen 443 ssl http2;
    server_name aims.giize.com;

    client_max_body_size 10G;

    # SSL 인증서 (certbot이 추가한 것)
    ssl_certificate /etc/letsencrypt/live/aims.giize.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aims.giize.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Let's Encrypt 인증용
    location /.well-known/acme-challenge/ {
        root /var/www/aims;
    }

    # 🔒 보안 헤더
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # React 정적 파일 서빙 (개발 디렉토리 직접 참조)
    location / {
        root /home/rossi/aims/frontend/aims-uix3/dist;
        try_files $uri $uri/ /index.html;

        # 캐싱 설정
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # API 리버스 프록시
    location /api/ {
        proxy_pass http://localhost:3010;
        proxy_http_version 1.1;

        # WebSocket 지원
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 기본 헤더
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 타임아웃 설정 (대용량 파일 업로드)
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}
