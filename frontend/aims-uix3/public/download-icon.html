<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>AIMS 아이콘 다운로드</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    h1 { color: #333; margin-bottom: 2rem; }
    .preview {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 2rem;
    }
    .preview img {
      width: 256px;
      height: 256px;
      border-radius: 48px;
    }
    .buttons {
      display: flex;
      gap: 1rem;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-primary {
      background: #4F46E5;
      color: white;
    }
    .btn-primary:hover {
      background: #4338CA;
    }
    .btn-secondary {
      background: #E5E7EB;
      color: #374151;
    }
    .info {
      margin-top: 2rem;
      color: #666;
      font-size: 14px;
    }
    canvas { display: none; }
  </style>
</head>
<body>
  <h1>AIMS 앱 아이콘</h1>

  <div class="preview">
    <img id="preview" src="aims-icon.svg" alt="AIMS Icon">
  </div>

  <div class="buttons">
    <button class="btn-primary" onclick="downloadPNG(512)">512x512 PNG 다운로드</button>
    <button class="btn-secondary" onclick="downloadPNG(256)">256x256 PNG 다운로드</button>
    <button class="btn-secondary" onclick="downloadPNG(1024)">1024x1024 PNG 다운로드</button>
  </div>

  <p class="info">카카오 앱 아이콘: 512x512 PNG 권장</p>

  <canvas id="canvas"></canvas>

  <script>
    function downloadPNG(size) {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = size;
      canvas.height = size;

      const img = new Image();
      img.onload = function() {
        ctx.clearRect(0, 0, size, size);
        ctx.drawImage(img, 0, 0, size, size);

        const link = document.createElement('a');
        link.download = `aims-icon-${size}x${size}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      };
      img.src = 'aims-icon.svg';
    }
  </script>
</body>
</html>
