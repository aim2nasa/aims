<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="docGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F3F4F6"/>
    </linearGradient>
  </defs>

  <!-- 배경 (둥근 사각형) -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bgGradient)"/>

  <!-- 문서 아이콘 (메인) -->
  <g transform="translate(96, 64)">
    <!-- 문서 본체 -->
    <path d="M40 0 L240 0 L320 80 L320 384 L0 384 L0 40 Q0 0 40 0 Z"
          fill="url(#docGradient)"
          opacity="0.95"/>

    <!-- 문서 접힌 부분 -->
    <path d="M240 0 L240 80 L320 80 Z" fill="#E5E7EB"/>

    <!-- 텍스트 라인들 -->
    <rect x="40" y="120" width="180" height="12" rx="6" fill="#9CA3AF"/>
    <rect x="40" y="152" width="240" height="12" rx="6" fill="#D1D5DB"/>
    <rect x="40" y="184" width="200" height="12" rx="6" fill="#D1D5DB"/>
    <rect x="40" y="216" width="220" height="12" rx="6" fill="#D1D5DB"/>

    <!-- AI 체크마크/스파클 -->
    <g transform="translate(180, 260)">
      <circle cx="60" cy="60" r="56" fill="#10B981"/>
      <path d="M30 60 L50 80 L90 40"
            stroke="white"
            stroke-width="12"
            stroke-linecap="round"
            stroke-linejoin="round"
            fill="none"/>
    </g>
  </g>

  <!-- AI 스파클 효과 -->
  <g fill="#FCD34D">
    <circle cx="420" cy="100" r="16"/>
    <circle cx="440" cy="160" r="10"/>
    <circle cx="100" cy="420" r="12"/>
  </g>
</svg>
